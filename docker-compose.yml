services:
  azulweb:
    build: .
    image: azulweb
    ports:
      - "8000:8000"
    volumes:
      - ${WORKSPACE:-./data}:/app/workspace
    environment:
      - PYTHONUNBUFFERED=1
      - IDR_USER=${IDR_USER:-}
      - IDR_PASS=${IDR_PASS:-}
      - DSS_USER=${DSS_USER:-}
      - DSS_PASS=${DSS_PASS:-}
    restart: unless-stopped