<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Azulweb</title>
  <link rel="icon" type="image/x-icon" href="img/azul_favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<!-- Logo --> 
<header>
  <img src="img/azul.png" alt="Azul logo" class="logo">
</header>

<!-- Find -->
<section class="section">
  <h2>Find</h2>

  <!-- Aladin -->
  <div id="aladinMap"></div>
  <p class="map-hint">Click on the sky to select coordinates — or type below</p>

  <div class="row">
    <div>
      <label>Objects</label>
      <input id="findObjects" type="text" placeholder="M82 NGC6536">
    </div>
    <div>
      <label>Tiling file</label>
      <input id="findTiling" type="text" placeholder="DpdMerFinalCatalog.geojson">
    </div>
  </div>
  <div class="row">
    <div>
      <label>RA (deg)</label>
      <input id="findRa" type="text" placeholder="266.9397155">
    </div>
    <div>
      <label>Dec (deg)</label>
      <input id="findDec" type="text" placeholder="+64.0472200">
    </div>
  </div>

  <button id="btnFind">▶ azul find</button>
  <div class="progress" id="progFind">
    <div class="progress-bar" id="progFindBar" style="width:0%"></div>
  </div>
  <div class="term" id="termFind"></div>
  <div class="tiles" id="tilesResult"></div>
  <div id="sendRetrieve" style="display:none; margin-top:10px">
    <button id="btnSendRetrieve">→ Send to Retrieve</button>
  </div>
</section>

<!-- Retrieve -->
<section class="section">
  <h2>Retrieve</h2>
  <div class="row">
    <div>
      <label>Tile indices</label>
      <input id="retrieveTiles" type="text" placeholder="102159776 102159777">
    </div>
    <div>
      <label>Provider</label>
      <select id="retrieveProvider">
        <option value="idr">IDR (private)</option>
        <option value="sas">SAS (public)</option>
        <option value="dss">DSS</option>
      </select>
    </div>
  </div>
  <div>
    <label>Dataset releases</label>
    <input id="retrieveDsr" type="text" value="DR1_R2,DR1_R1,Q1_R1">
  </div>
  <button id="btnRetrieve">▶ azul retrieve</button>
  <div class="progress" id="progRetrieve">
    <div class="progress-bar" id="progRetrieveBar" style="width:0%"></div>
  </div>
  <div class="term" id="termRetrieve"></div>
</section>

<!-- Crop -->
<section class="section">
  <h2>Crop</h2>
  <div class="row">
    <div>
      <label>Tile index</label>
      <input id="cropTile" type="text" placeholder="102159776">
    </div>
    <div style="display:flex; align-items:flex-end; padding-bottom:12px">
      <button class="primary" id="btnCropPreview" style="width:100%">▶ Load VIS preview</button>
    </div>
  </div>

  <div id="cropContainer" style="display:none">
    <div id="cropStatus" style="font-size:11px; color:#3d6a9a; margin-bottom:8px"></div>
    <div style="overflow:auto; border:1px solid #0f2040; border-radius:4px; background:#202020">
      <canvas id="cropCanvas" style="display:block; max-width:100%; cursor:crosshair; margin: 0 auto;"></canvas>
    </div>
    <div id="cropResult" style="display:none; margin-top:10px; display:flex; gap:10px; align-items:center">
      <code id="cropSlicing" style="font-size:12px; color:#4ec9b0; flex:1"></code>
      <button id="btnCropSend">→ Send to Process</button>
    </div>
  </div>
</section>

<!-- Process -->
<section class="section">
  <h2>Process</h2>

  <div>
    <label>Tile spec</label>
    <input id="processTile" type="text" placeholder="102159776[6000:7000,5000:7000]">
  </div>

  <details style="margin-bottom:14px">
    <summary style="font-size:11px; color:#3d6a9a; cursor:pointer; user-select:none; text-transform:uppercase; letter-spacing:.08em">Parameters</summary>
    <div style="margin-top:12px">

      <div class="row">
        <div>
          <label>Zero points I Y J H</label>
          <input id="procZero" type="text" value="24.5, 29.8, 30.1, 30.0">
        </div>
        <div>
          <label>Scaling I Y J H</label>
          <input id="procScaling" type="text" value="2.2, 1.3, 1.2, 1.0">
        </div>
      </div>

      <div class="row">
        <div>
          <label>FWHM I Y J H</label>
          <input id="procFwhm" type="text" value="1.6, 3.5, 3.4, 3.5">
        </div>
        <div>
          <label>Sharpen strength</label>
          <input id="procSharpen" type="number" step="0.1" value="0.5">
        </div>
      </div>

      <div class="row">
        <div>
          <label>NIR → L</label>
          <input id="procNirl" type="number" step="0.05" value="0.1">
        </div>
        <div>
          <label>I → B</label>
          <input id="procIb" type="number" step="0.05" value="1.0">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Y → G</label>
          <input id="procYg" type="number" step="0.05" value="0.5">
        </div>
        <div>
          <label>J → R</label>
          <input id="procJr" type="number" step="0.05" value="0.25">
        </div>
      </div>

      <div class="row">
        <div>
          <label>White point (mag)</label>
          <input id="procWhite" type="number" step="0.5" value="22.0">
        </div>
        <div>
          <label>Stretch (mag)</label>
          <input id="procStretch" type="number" step="0.5" value="28.0">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Offset / black (mag)</label>
          <input id="procOffset" type="number" step="0.5" value="29.0">
        </div>
        <div>
          <label>Hue shift (°)</label>
          <input id="procHue" type="number" step="1" value="-20">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Saturation</label>
          <input id="procSaturation" type="number" step="0.1" value="1.2">
        </div>
        <div style="display:flex; align-items:flex-end; padding-bottom:12px">
          <button id="btnResetProcess" style="width:100%">↺ Reset defaults</button>
        </div>
      </div>

    </div>
  </details>

  <button class="primary" id="btnProcess">▶ azul process</button>
  <div class="progress" id="progProcess"><div class="progress-bar" id="progProcessBar" style="width:0%"></div></div>
  <div class="term" id="termProcess"></div>

  <div id="processResult" style="display:none; text-align:center; margin-top:14px;">
    <div id="processResultWrapper" style="overflow:auto; border:1px solid #222; border-radius:4px; background:#202020; box-shadow:0 0 4px rgba(0,0,0,0.5)">
      <img id="processResultImg" src="" alt="Preview" style="display:block; max-width:100%; height:auto; margin:0 auto; border-radius:2px;">
    </div>
    <div id="processResultLabel" style="margin-top:8px; color:#ccc; font-size:12px;"></div>
  </div>
</section>


<script type="module" src="js/main.js"></script>
</body>
</html>
