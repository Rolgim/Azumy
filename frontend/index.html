<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Azulweb</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Azulweb</h1>

<!-- FIND -->
<section class="section">
  <h2>Find</h2>
  <div class="row">
    <div>
      <label>Objects</label>
      <input id="findObjects" type="text" placeholder="M82 NGC6536">
    </div>
    <div>
      <label>Tiling file</label>
      <input id="findTiling" type="text" placeholder="DpdMerFinalCatalog.geojson">
    </div>
  </div>
  <div class="row">
    <div>
      <label>RA</label>
      <input id="findRa" type="text" placeholder="266.9397155">
    </div>
    <div>
      <label>Dec</label>
      <input id="findDec" type="text" placeholder="+64.0472200">
    </div>
  </div>
  <button id="btnFind">▶ azul find</button>
  <div class="progress" id="progFind">
    <div class="progress-bar" id="progFindBar" style="width:0%"></div>
  </div>
  <div class="term" id="termFind"></div>
  <div class="tiles" id="tilesResult"></div>
  <div id="sendRetrieve" style="display:none; margin-top:10px">
    <button id="btnSendRetrieve">→ Send to Retrieve</button>
  </div>
</section>

<!-- RETRIEVE -->
<section class="section">
  <h2>Retrieve</h2>
  <div class="row">
    <div>
      <label>Tile indices</label>
      <input id="retrieveTiles" type="text" placeholder="102159776 102159777">
    </div>
    <div>
      <label>Provider</label>
      <select id="retrieveProvider">
        <option value="idr">IDR (private)</option>
        <option value="sas">SAS (public)</option>
        <option value="dss">DSS</option>
      </select>
    </div>
  </div>
  <div>
    <label>Dataset releases</label>
    <input id="retrieveDsr" type="text" value="DR1_R2,DR1_R1,Q1_R1">
  </div>
  <button id="btnRetrieve">▶ azul retrieve</button>
  <div class="progress" id="progRetrieve">
    <div class="progress-bar" id="progRetrieveBar" style="width:0%"></div>
  </div>
  <div class="term" id="termRetrieve"></div>
</section>

<script type="module" src="js/main.js"></script>
</body>
</html>
